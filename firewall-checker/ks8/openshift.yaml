apiVersion: apps/v1
kind: Deployment
metadata:
  name: firewall-checker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: firewall-checker
  template:
    metadata:
      labels:
        app: firewall-checker
    spec:
      containers:
      - name: checker
        image: <YOUR_IMAGE>
        ports:
        - containerPort: 3100
        env:
        - name: INTERVAL_SECONDS
          value: "60"
---
apiVersion: v1
kind: Service
metadata:
  name: firewall-checker
spec:
  selector:
    app: firewall-checker
  ports:
  - port: 3100
    targetPort: 3100
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: firewall-checker
  
 labels:
    app: firewall-checker
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3100"
    prometheus.io/path: "/metrics"

spec:
  to:
    kind: Service
    name: firewall-checker
  tls:
    termination: edge