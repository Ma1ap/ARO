- name: runtime
  container:
    image: python:3.11-slim
    mountSources: true
    sourceMapping: /projects

    command:
      - bash
      - -lc
      - |
        cd /projects/aro/firewall-checker && \
        pip install -r requirements.txt && \
        python -m uvicorn app.main:app \
          --host ${BIND_HOST:-127.0.0.1} \
          --port 3100 \
          --reload

    env:
      - name: BIND_HOST
        value: "127.0.0.1"
      - name: INTERVAL_SECONDS
        value: "60"
      - name: TIMEOUT_SECONDS
        value: "5"
      - name: CONFIG_PATH
        value: "/projects/aro/firewall-checker/config/checks.conf"
      - name: AUTH_MODE
        value: "basic"
      - name: BASIC_AUTH_USER
        value: "admin"
      - name: BASIC_AUTH_PASS
        value: "admin"

    endpoints:
      - name: web
        targetPort: 3100
        exposure: public
        protocol: https
        secure: true
